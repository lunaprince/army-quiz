        let currentQuestions = [];
        let currentOptionsDict = {}; // 用於儲存 {代號: 裝備名稱} 供檢查答案

        // 產生 A 到 Y 的英文字母陣列 (25個)
        const generateAlphabet = () => {
            return Array.from({length: 25}, (_, i) => String.fromCharCode(65 + i));
        };

        function startQuiz() {
            // 清空畫面狀態
            document.getElementById('quizGrid').innerHTML = '';
            document.getElementById('optionsGrid').innerHTML = '';
            document.getElementById('score-display').innerHTML = '';
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('optionsPool').style.display = 'block';

            currentOptionsDict = {};

            // 1. 隨機打亂總資料庫
            const shuffledData = [...allEquipmentData].sort(() => 0.5 - Math.random());

            // 2. 抽出前 10 題作為測驗圖片題目
            currentQuestions = shuffledData.slice(0, 10);
            const correctNames = currentQuestions.map(item => item.name);

            // 3. 從剩下的資料中抽出 15 個錯誤選項
            const remainingData = shuffledData.slice(10);
            const incorrectNames = remainingData.slice(0, 15).map(item => item.name);

            // 4. 將 10 個正確答案 + 15 個錯誤選項合併，組成 25 個選單選項，並打亂順序
            let allOptionNames = [...correctNames, ...incorrectNames].sort(() => 0.5 - Math.random());
            
            // 5. 將打亂後的 25 個選項配上 A~Y 的代號
            const alphabet = generateAlphabet();
            
            const optionsGrid = document.getElementById('optionsGrid');
            
            allOptionNames.forEach((name, index) => {
                const letter = alphabet[index];
                currentOptionsDict[letter] = name; // 存入字典以便後續對答案： { 'A': '殲 20 機', ... }

                // 產生選項池的 HTML
                const optDiv = document.createElement('div');
                optDiv.className = 'option-item';
                optDiv.innerHTML = `<span class="option-letter">${letter}</span> ${name}`;
                optionsGrid.appendChild(optDiv);
            });

            // 6. 繪製測驗圖片網格
            renderQuizGrid(alphabet);
        }

        function renderQuizGrid(alphabet) {
            const grid = document.getElementById('quizGrid');
            
            // 建立供圖片下方下拉選擇的代號 HTML (A 到 Y)
            let selectOptionsHtml = '<option value="">- 選代號 -</option>';
            alphabet.forEach(letter => {
                selectOptionsHtml += `<option value="${letter}">${letter}</option>`;
            });

            // 產生 10 個圖片卡片
            currentQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.id = `card-${index}`;

                card.innerHTML = `
                    <div class="q-number">${index + 1}</div>
                    <div class="img-container">
                        <img src="${q.image}" alt="裝備圖片" onerror="this.src='https://via.placeholder.com/300x200?text=找不到圖檔：${q.image}'">
                    </div>
                    <div class="answer-area">
                        <span>選項代號：</span>
                        <select id="select-${index}">
                            ${selectOptionsHtml}
                        </select>
                    </div>
                    <div class="result-msg" id="msg-${index}"></div>
                `;
                grid.appendChild(card);
            });
        }

        function checkAnswers() {
            let score = 0;
            const total = currentQuestions.length;

            currentQuestions.forEach((q, index) => {
                const selectElement = document.getElementById(`select-${index}`);
                const selectedCard = document.getElementById(`card-${index}`);
                const msgElement = document.getElementById(`msg-${index}`);
                
                const userLetter = selectElement.value; // 使用者選的代號 (例如 'C')
                const userAnswerName = currentOptionsDict[userLetter]; // 根據代號查出對應的裝備名稱
                
                // 清除之前的狀態
                selectedCard.classList.remove('correct', 'incorrect');
                
                if (userAnswerName === q.name) {
                    // 答對
                    score++;
                    selectedCard.classList.add('correct');
                    msgElement.innerHTML = `<span class="correct-text">✔️ 答對了！</span>`;
                    selectElement.disabled = true; // 答對鎖定選項
                } else {
                    // 答錯
                    selectedCard.classList.add('incorrect');
                    
                    // 找出正確答案的英文字母代號
                    let correctLetter = "";
                    for (let letter in currentOptionsDict) {
                        if (currentOptionsDict[letter] === q.name) {
                            correctLetter = letter;
                            break;
                        }
                    }

                    if (userLetter === "") {
                        msgElement.innerHTML = `<span class="incorrect-text">❌ 您未作答</span>`;
                    } else {
                        msgElement.innerHTML = `<span class="incorrect-text">❌ 答錯了</span>`;
                    }
                    // 顯示正確答案與代號
                    msgElement.innerHTML += `<div class="true-answer">正確解答：<br><strong>${correctLetter}. ${q.name}</strong></div>`;
                }
            });

            // 顯示總分
            const scoreDisplay = document.getElementById('score-display');
            const percentage = Math.round((score / total) * 100);
            
            let comment = "";
            if (percentage === 100) comment = "太神啦！💯 完全正確！";
            else if (percentage >= 80) comment = "非常優秀！👍 繼續保持！";
            else if (percentage >= 60) comment = "及格邊緣！加油！📚";
            else comment = "需要再多複習喔！💪";

            scoreDisplay.innerHTML = `本次測驗得分： <span style="color:#007bff;">${score} / ${total}</span> 題 (${percentage}%)<br><span style="font-size: 0.7em; color: #555;">${comment}</span>`;
            
            // 捲動到最上方看分數
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 預設一進入網頁就自動產生第一份考題
        startQuiz();
    </script>
</body>
</html>
