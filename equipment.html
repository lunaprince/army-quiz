    <style>
        body {
            font-family: "微軟正黑體", "Microsoft JhengHei", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .header {
            width: 100%;
            max-width: 1200px;
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .instructions {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .top-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: bold;
            border: none;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-primary:active { transform: scale(0.97); }

        .btn-success { background-color: #28a745; color: white; }
        .btn-success:hover { background-color: #218838; }
        .btn-success:active { transform: scale(0.97); }

        /* 測驗網格 */
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin-bottom: 40px;
        }

        .quiz-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        /* 狀態樣式 */
        .quiz-card.correct { border-color: #28a745; background-color: #f8fff9; }
        .quiz-card.incorrect { border-color: #dc3545; background-color: #fffafb; }

        .img-container {
            width: 100%;
            height: 200px;
            background-color: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        select {
            width: 100%;
            padding: 10px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: white;
            cursor: pointer;
            outline: none;
        }
        
        select:focus { border-color: #007bff; }

        .result-msg {
            margin-top: 10px;
            font-size: 0.9em;
            font-weight: bold;
            text-align: center;
            min-height: 20px;
        }

        .correct-text { color: #28a745; }
        .incorrect-text { color: #dc3545; }
        .true-answer { color: #333; font-size: 0.85em; margin-top: 5px; background: #fff3cd; padding: 4px 8px; border-radius: 4px; border: 1px solid #ffeeba;}

        #score-display {
            font-size: 1.5em;
            font-weight: bold;
            color: #1a1a1a;
            margin-top: 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* 手機板適配 */
        @media (max-width: 600px) {
            .top-controls { flex-direction: column; }
            .btn { width: 100%; }
        }

    </style>
</head>

        let currentQuestions = [];
        let currentOptions = [];

        function startQuiz() {
            // 清空畫面狀態
            document.getElementById('quizGrid').innerHTML = '';
            document.getElementById('score-display').innerHTML = '';
            document.getElementById('submitBtn').style.display = 'inline-block';

            // 1. 隨機打亂總資料庫
            const shuffledData = [...allEquipmentData].sort(() => 0.5 - Math.random());

            // 2. 抽出前 10 題作為測驗題目
            currentQuestions = shuffledData.slice(0, 10);
            const correctNames = currentQuestions.map(item => item.name);

            // 3. 從剩下的資料中抽出 15 個錯誤選項
            const remainingData = shuffledData.slice(10);
            const incorrectNames = remainingData.slice(0, 15).map(item => item.name);

            // 4. 將 10 個正確答案 + 15 個錯誤選項合併，組成 25 個選單選項，並打亂順序
            currentOptions = [...correctNames, ...incorrectNames].sort(() => 0.5 - Math.random());

            // 5. 繪製測驗網格
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('quizGrid');
            
            // 建立選單的 HTML (共用給 10 個選擇框)
            let optionsHtml = '<option value="">-- 請選擇正確的裝備名稱 --</option>';
            currentOptions.forEach(opt => {
                optionsHtml += `<option value="${opt}">${opt}</option>`;
            });

            // 產生 10 個圖片與選單卡片
            currentQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.id = `card-${index}`;

                card.innerHTML = `
                    <div class="img-container">
                        <img src="${q.image}" alt="裝備圖片" onerror="this.src='https://via.placeholder.com/300x200?text=找不到圖檔：${q.image}'">
                    </div>
                    <select id="select-${index}">
                        ${optionsHtml}
                    </select>
                    <div class="result-msg" id="msg-${index}"></div>
                `;
                grid.appendChild(card);
            });
        }

        function checkAnswers() {
            let score = 0;
            const total = currentQuestions.length;

            currentQuestions.forEach((q, index) => {
                const selectElement = document.getElementById(`select-${index}`);
                const selectedCard = document.getElementById(`card-${index}`);
                const msgElement = document.getElementById(`msg-${index}`);
                
                const userAnswer = selectElement.value;
                
                // 清除之前的狀態
                selectedCard.classList.remove('correct', 'incorrect');
                
                if (userAnswer === q.name) {
                    // 答對
                    score++;
                    selectedCard.classList.add('correct');
                    msgElement.innerHTML = `<span class="correct-text">✔️ 答對了！</span>`;
                    selectElement.disabled = true; // 答對鎖定選項
                } else {
                    // 答錯
                    selectedCard.classList.add('incorrect');
                    if (userAnswer === "") {
                        msgElement.innerHTML = `<span class="incorrect-text">❌ 您未作答</span>`;
                    } else {
                        msgElement.innerHTML = `<span class="incorrect-text">❌ 答錯了</span>`;
                    }
                    // 顯示正確答案
                    msgElement.innerHTML += `<div class="true-answer">正確解答：<br><strong>${q.name}</strong></div>`;
                }
            });

            // 顯示總分
            const scoreDisplay = document.getElementById('score-display');
            const percentage = Math.round((score / total) * 100);
            
            let comment = "";
            if (percentage === 100) comment = "太神啦！💯 完全正確！";
            else if (percentage >= 80) comment = "非常優秀！👍 繼續保持！";
            else if (percentage >= 60) comment = "及格邊緣！加油！📚";
            else comment = "需要再多複習喔！💪";

            scoreDisplay.innerHTML = `本次測驗得分： <span style="color:#007bff;">${score} / ${total}</span> 題 (${percentage}%)<br><span style="font-size: 0.7em; color: #555;">${comment}</span>`;
            
            // 捲動到最上方看分數
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 預設一進入網頁就自動產生第一份考題
        startQuiz();
