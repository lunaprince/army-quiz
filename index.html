<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共軍部隊編組 - 互動式記憶測驗 Pro</title>
    <style>
        body {
            font-family: "微軟正黑體", "Microsoft JhengHei", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden; 
        }

        /* 下拉式選單區塊 */
        .header {
            width: 100%;
            max-width: 1500px;
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            text-align: center;
        }
        h1 {
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        .selector-label {
            font-size: 1.1em;
            color: #555;
            margin-right: 10px;
        }
        select {
            padding: 10px 15px;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            background-color: #f7f9fc;
        }

        /* 組織圖排版容器 */
        .org-chart-wrapper {
            width: 100%;
            overflow-x: auto; 
            padding-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .org-chart {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px; 
            min-width: 1000px; 
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .level {
            display: flex;
            justify-content: center;
        }

        .level-1 { gap: 0; }
        .level-1-5 { gap: 80px; margin-top: -15px; } 
        .level-2 { gap: 30px; } 
        .level-3 { gap: 12px; } 

        /* 固定的上層標題樣式 */
        .static-army {
            width: 220px; 
            height: 65px;
            border: 3px solid #ed1c24;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold; 
            font-size: 1.3em;
            color: #333;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .static-person-count {
            font-size: 0.6em;
            margin-top: 5px;
            font-weight: normal;
        }

        /* 旅部與直屬連的小方塊樣式 */
        .static-sub-dept {
            width: 100px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1em;
            color: #ed1c24; 
        }
        .pink-bg { background-color: #ffcce6; border: 1px solid #ed1c24; }
        .white-bg { background-color: white; border: 1px solid #ed1c24; }

        /* 翻牌卡片基礎設定 */
        .flashcard-container {
            perspective: 1000px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        
        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: white;
            box-sizing: border-box;
        }

        /* 正面：加密/空白狀態 (考題) */
        .card-front {
            background-color: #e9ecef;
            color: #adb5bd;
            border: 1px dashed #ced4da;
            font-size: 1.5em;
            font-weight: bold;
        }

        /* 背面：解答狀態 */
        .card-back {
            transform: rotateY(180deg); 
            border: none; 
        }

        /* 具體卡片尺寸與樣式 */
        .dept-card { width: 100px; height: 45px; }
        .dept-default { border: 1px solid #dc3545; background-color: white; font-size: 1em; color: #333; } 
        .dept-pink { border: 1px solid #ed1c24; background-color: #ffcce6; font-size: 0.9em; color: #ed1c24; font-weight: bold; }
        .dept-white { border: 1px solid #ed1c24; background-color: white; font-size: 0.9em; color: #ed1c24; font-weight: bold; }

        .unit-card { width: 65px; height: 260px; }
        .unit-card .card-back { justify-content: flex-start; padding-top: 10px; }

        /* ★★★ 單位邊框與底色對應 ★★★ */
        
        /* 1. 集團軍原有底色 */
        .amphibious-heavy { background-color: #b71c1c; border: 1px solid #ed1c24; color: white; } 
        .amphibious-heavy .person-count { color: white !important; }
        .heavy { background-color: #ffc107; border: 1px solid #ed1c24; color: #333; } 
        .medium { background-color: #8bc34a; border: 1px solid #ed1c24; color: #333; } 
        .light { background-color: #e0f7fa; border: 1px solid #ed1c24; color: #333; } 
        .branch { background-color: #ffeb3b; border: 1px solid #ed1c24; color: #333; }   
        
        /* 2. 海軍陸戰隊 (總體) 各戰區實心配色 (已修復最後三個) */
        .marines_southern_bg { background-color: #ffeb3b; border: 1px solid #ed1c24; color: #333; }
        .marines_eastern_bg { background-color: #e0f7fa; border: 1px solid #ed1c24; color: #333; }
        .marines_northern_bg { background-color: #8bc34a; border: 1px solid #ed1c24; color: #333; }

        /* 3. 海軍陸戰合成旅 (各營底色，文字為紅色) */
        .marine_bat_combat { background-color: #ffc107; border: 1px solid #ed1c24; color: #ed1c24; } 
        .marine_bat_air { background-color: #e0f7fa; border: 1px solid #ed1c24; color: #ed1c24; } 
        .marine_bat_branch { background-color: #ffeb3b; border: 1px solid #ed1c24; color: #ed1c24; } 

        /* 4. 空中突擊旅 (白底紅框例外，文字為紅色) */
        .air_assault_unit { background-color: white; border: 1px solid #ed1c24; color: #ed1c24; }

        /* 直排文字處理 */
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright; 
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 1.1em;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        /* 針對文字較多的單位，稍微縮小字體以塞入框內 */
        .long-text {
            font-size: 0.95em;
            letter-spacing: 1px;
        }

        /* 人數顯示 */
        .person-count {
            font-size: 0.85em;
            color: #333;
            margin-bottom: 10px;
        }

        /* 備註文字框 */
        .remark-box {
            width: 100%;
            max-width: 1000px;
            margin-top: 15px;
            padding: 10px;
            background-color: #f7f9fc;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9em;
            color: #666;
            text-align: left;
            display: none; 
        }

        /* 控制按鈕 */
        .controls {
            margin-top: 25px;
        }
        button {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            font-size: 1em;
        }
        button:hover { background-color: #0056b3; }

    </style>
</head>
<body>

    <div class="header">
        <h1>共軍部隊編組 - 記憶測驗</h1>
        <div class="selector-container">
            <span class="selector-label">選擇部隊：</span>
            <select id="armySelector">
                <optgroup label="陸軍 (集團軍)">
                    <option value="71" selected>第71集團軍</option>
                    <option value="72">第72集團軍</option>
                    <option value="73">第73集團軍</option>
                </optgroup>
                <optgroup label="海軍">
                    <option value="marines">海軍陸戰隊 (總體)</option>
                </optgroup>
                <optgroup label="範例合成旅/兵種旅">
                    <option value="marines_合成旅">海軍陸戰合成旅</option>
                    <option value="air_assault_旅">空中突擊旅</option>
                </optgroup>
            </select>
        </div>
        <p style="color: #666; margin-top: 15px; margin-bottom: 0;">提示：最上方標題固定顯示。部門與旅/營級單位已蓋牌，點擊空白框框翻牌。</p>
    </div>

    <div class="org-chart-wrapper">
        <div class="org-chart" id="orgChart">
            
            <div class="level level-1" id="level1"></div>
            <div class="level level-1-5" id="level1_5" style="display: none;"></div>
            <div class="level level-2" id="level2"></div>
            <div class="level level-3" id="level3"></div>
            <div class="remark-box" id="remarkBox"></div>

        </div>
    </div>

    <div class="controls">
        <button id="resetBtn">重新測驗 (全部蓋上)</button>
    </div>

    <script>
        const defaultDeptsData = [
            { class: 'dept-default', label: '參謀部' }, { class: 'dept-default', label: '政治部' }, 
            { class: 'dept-default', label: '保障部' }, { class: 'dept-default', label: '裝備部' }, 
            { class: 'dept-default', label: '紀檢部' }
        ];

        const unitsData_71 = [
            { class: 'heavy', label: '重型合成2旅', count: '4500' }, { class: 'heavy', label: '重型合成35旅', count: '4500' },
            { class: 'heavy', label: '重型合成160旅', count: '4500' }, { class: 'heavy', label: '重型合成235旅', count: '4500' },
            { class: 'medium', label: '中型合成178旅', count: '4600' }, { class: 'light', label: '輕型合成179旅', count: '5000' },
            { class: 'branch', label: '陸航71旅', count: '2000' }, { class: 'branch', label: '砲兵71旅', count: '3000' },
            { class: 'branch', label: '防空71旅', count: '2500' }, { class: 'branch', label: '特戰71旅', count: '2500' },
            { class: 'branch', label: '工化71旅', count: '2500' }, { class: 'branch', label: '勤務支援71旅', count: '2500' }
        ];

        const unitsData_72 = [
            { class: 'amphibious-heavy', label: '兩棲重型合成5旅', count: '4500' }, { class: 'amphibious-heavy', label: '兩棲重型合成124旅', count: '4500' },
            { class: 'heavy', label: '重型合成10旅', count: '4500' }, { class: 'medium', label: '中型合成34旅', count: '4600' },
            { class: 'medium', label: '中型合成85旅', count: '4600' }, { class: 'light', label: '輕型合成90旅', count: '5000' },
            { class: 'branch', label: '陸航72旅', count: '2000' }, { class: 'branch', label: '砲兵72旅', count: '3000' },
            { class: 'branch', label: '防空72旅', count: '2500' }, { class: 'branch', label: '特戰72旅', count: '2500' },
            { class: 'branch', label: '工兵1旅', count: '2500' }, { class: 'branch', label: '防化1旅', count: '2500' },
            { class: 'branch', label: '勤務支援72旅', count: '2500' }
        ];

        const unitsData_73 = [
            { class: 'amphibious-heavy', label: '兩棲重型合成14旅', count: '4500' }, { class: 'amphibious-heavy', label: '兩棲重型合成91旅', count: '4500' },
            { class: 'heavy', label: '重型合成86旅', count: '4500' }, { class: 'medium', label: '中型合成145旅', count: '4600' },
            { class: 'light', label: '輕型合成3旅', count: '5000' }, { class: 'light', label: '輕型合成92旅', count: '5000' },
            { class: 'branch', label: '陸航73旅', count: '2000' }, { class: 'branch', label: '砲兵73旅', count: '3000' },
            { class: 'branch', label: '防空73旅', count: '2500' }, { class: 'branch', label: '特戰73旅', count: '2500' },
            { class: 'branch', label: '工化73旅', count: '2500' }, { class: 'branch', label: '勤務支援73旅', count: '2500' }
        ];

        // ★★★ 已修復：後三個單位現在皆為直排且有實心底色 ★★★
        const unitsData_Marines = [
            { class: 'marines_southern_bg', type: 'unit', label: '陸戰1旅', count: '4500' }, { class: 'marines_southern_bg', type: 'unit', label: '陸戰2旅', count: '4500' },
            { class: 'marines_eastern_bg', type: 'unit', label: '陸戰3旅', count: '4500' }, { class: 'marines_eastern_bg', type: 'unit', label: '陸戰4旅', count: '4500' },
            { class: 'marines_northern_bg', type: 'unit', label: '陸戰5旅', count: '4500' }, { class: 'marines_northern_bg', type: 'unit', label: '陸戰6旅', count: '4500' },
            { class: 'marines_southern_bg', type: 'unit', label: '特種作戰旅', count: '2000' }, 
            { class: 'marines_eastern_bg', type: 'unit', label: '艦載機航空兵旅', count: '2000' },
            { class: 'marines_southern_bg', type: 'unit', label: '陸戰隊訓練基地', count: '1000' }
        ];

        const deptsData_Marines_合成旅 = [
            { class: 'dept-pink', label: '政工科' }, { class: 'dept-pink', label: '偵察科' }, 
            { class: 'dept-pink', label: '作訓科' }, { class: 'dept-pink', label: '火力科' }, 
            { class: 'dept-pink', label: '信息保障科' }, { class: 'dept-pink', label: '裝備管理科' }
        ];
        const unitsData_Marines_合成旅 = [
            { class: 'marine_bat_combat', label: '陸戰重型合成營', count: '500' }, { class: 'marine_bat_combat', label: '陸戰重型合成營', count: '500' },
            { class: 'marine_bat_combat', label: '陸戰中型合成營', count: '500' }, { class: 'marine_bat_air', label: '空中突擊營', count: '400' },
            { class: 'marine_bat_branch', label: '偵察營', count: '300' }, { class: 'marine_bat_branch', label: '砲兵營', count: '400' },
            { class: 'marine_bat_branch', label: '防空營', count: '450' }, { class: 'marine_bat_branch', label: '作戰支援營', count: '400' },
            { class: 'marine_bat_branch', label: '勤務保障營', count: '300' }
        ];

        const deptsData_Air_Assault = [
            { class: 'dept-white', label: '政工科' }, { class: 'dept-white', label: '偵察科' }, 
            { class: 'dept-white', label: '作訓科' }, { class: 'dept-white', label: '火力科' }, 
            { class: 'dept-white', label: '裝備管理科' }
        ];
        const unitsData_Air_Assault = [
            { class: 'air_assault_unit', label: '偵察直升機營', count: '200' }, { class: 'air_assault_unit', label: '攻擊直升機營', count: '200' }, 
            { class: 'air_assault_unit', label: '攻擊直升機營', count: '200' }, { class: 'air_assault_unit', label: '運輸直升機營', count: '200' }, 
            { class: 'air_assault_unit', label: '運輸直升機營', count: '200' }, { class: 'air_assault_unit', label: '運輸直升機營', count: '200' }, 
            { class: 'air_assault_unit', label: '突擊步兵營', count: '500' }, { class: 'air_assault_unit', label: '突擊步兵營', count: '500' },   
            { class: 'air_assault_unit', label: '突擊步兵營', count: '500' }, { class: 'air_assault_unit', label: '勤務保障營', count: '300' }    
        ];

        const level1 = document.getElementById('level1');
        const level1_5 = document.getElementById('level1_5');
        const level2 = document.getElementById('level2');
        const level3 = document.getElementById('level3');
        const remarkBox = document.getElementById('remarkBox');
        const selector = document.getElementById('armySelector');

        function loadArmyChart(unitId) {
            level1.innerHTML = '';
            level1_5.innerHTML = '';
            level1_5.style.display = 'none';
            level2.innerHTML = '';
            level3.innerHTML = '';
            remarkBox.innerHTML = '';
            remarkBox.style.display = 'none';

            let armyName;
            let personCount;
            let units;
            let depts = defaultDeptsData; 
            let remarkText;

            if (unitId === 'marines') {
                armyName = '海軍陸戰隊';
                personCount = '約30000-35000人';
                units = unitsData_Marines;
            } else if (unitId === 'marines_合成旅') {
                armyName = '海軍陸戰合成旅';
                personCount = '約4500人';
                units = unitsData_Marines_合成旅;
                depts = deptsData_Marines_合成旅;
                remarkText = '陸戰合成旅下轄三個合成營及空突營及五個兵種營';
                
                level1_5.style.display = 'flex';
                level1_5.innerHTML = `
                    <div class="static-sub-dept pink-bg">旅　　部</div>
                    <div class="static-sub-dept pink-bg">直 屬 連</div>
                `;
            } else if (unitId === 'air_assault_旅') {
                armyName = '空中突擊旅';
                personCount = '約3000人';
                units = unitsData_Air_Assault;
                depts = deptsData_Air_Assault;
                remarkText = '共軍陸軍空中突擊旅編組於75集團軍空突121旅、83集團軍空突161旅及及空降兵軍空突130旅。';

                level1_5.style.display = 'flex';
                level1_5.innerHTML = `
                    <div class="static-sub-dept white-bg">旅　　部</div>
                    <div class="static-sub-dept white-bg">直 屬 連</div>
                `;
            } else {
                armyName = `第${unitId}集團軍`;
                personCount = '約45000-50000人';
                if (unitId === '71') units = unitsData_71;
                else if (unitId === '72') units = unitsData_72;
                else if (unitId === '73') units = unitsData_73;
            }

            level1.innerHTML = `
                <div class="static-army">
                    <div>${armyName}</div>
                    <div class="static-person-count">${personCount}</div>
                </div>
            `;

            depts.forEach(dept => createFlashCard(dept, 'dept', level2));
            units.forEach(unit => createFlashCard(unit, 'unit', level3));

            if (remarkText) {
                remarkBox.innerHTML = remarkText;
                remarkBox.style.display = 'block';
            }
        }

        function createFlashCard(data, type, container) {
            const cardWrapper = document.createElement('div');
            cardWrapper.className = `flashcard-container ${type}-card`;
            cardWrapper.onclick = function() {
                this.querySelector('.flashcard').classList.toggle('is-flipped');
            };

            const flashcard = document.createElement('div');
            flashcard.className = 'flashcard';

            const front = document.createElement('div');
            front.className = 'card-face card-front';
            front.textContent = '?';

            const back = document.createElement('div');
            back.className = `card-face card-back ${data.class || ''}`; 

            if (type === 'unit') {
                // 如果文字太長，加上 long-text 的 class 來稍微縮小字體
                let textClass = data.label.length >= 7 ? 'vertical-text long-text' : 'vertical-text';
                
                back.innerHTML = `
                    <div class="${textClass}">${data.label}</div>
                    <div class="person-count" style="${data.class === 'amphibious-heavy' ? 'color:white;' : ''}">${data.count}</div>
                `;
            } else {
                back.innerHTML = `<div>${data.label}</div>`;
            }

            flashcard.appendChild(front);
            flashcard.appendChild(back);
            cardWrapper.appendChild(flashcard);
            container.appendChild(cardWrapper);
        }

        selector.onchange = function() {
            loadArmyChart(this.value);
        };

        document.getElementById('resetBtn').onclick = () => {
            document.querySelectorAll('.flashcard').forEach(card => card.classList.remove('is-flipped'));
        };

        loadArmyChart('71');

    </script>
</body>
</html>
