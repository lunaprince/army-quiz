<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共軍部隊編組 - 互動式記憶測驗 Pro</title>
    <style>
        body {
            font-family: "微軟正黑體", "Microsoft JhengHei", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden; 
        }

        /* 下拉式選單區塊 */
        .header {
            width: 100%;
            max-width: 1500px;
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            text-align: center;
        }
        h1 {
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        .selector-label {
            font-size: 1.1em;
            color: #555;
            margin-right: 10px;
        }
        select {
            padding: 10px 15px;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            background-color: #f7f9fc;
        }

        /* 組織圖排版容器 */
        .org-chart-wrapper {
            width: 100%;
            overflow-x: auto; 
            padding-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .org-chart {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; 
            min-width: 1000px; 
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .level {
            display: flex;
            justify-content: center;
        }

        .level-1 { gap: 0; }
        .level-2 { gap: 30px; } 
        .level-3 { gap: 12px; } 

        /* 固定的上層標題樣式 (不翻牌) */
        .static-army {
            width: 220px; 
            height: 65px;
            border: 3px solid #ed1c24;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold; 
            font-size: 1.3em;
            color: #333;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .static-army .person-count {
            font-size: 0.6em;
            margin-top: 5px;
            font-weight: normal;
        }

        /* 翻牌卡片基礎設定 */
        .flashcard-container {
            perspective: 1000px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        
        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: white;
            box-sizing: border-box;
        }

        /* 正面：加密/空白狀態 (考題) */
        .card-front {
            background-color: #e9ecef;
            color: #adb5bd;
            border: 1px dashed #ced4da;
            font-size: 1.5em;
            font-weight: bold;
        }

        /* 背面：解答狀態 */
        .card-back {
            transform: rotateY(180deg); 
        }

        /* 具體卡片尺寸與樣式 */
        .dept-card { width: 100px; height: 45px; }
        .dept-card .card-back { border: 1px solid #dc3545; font-size: 1em; color: #333; }

        .unit-card { width: 65px; height: 260px; }
        /* 移除 default 邊框，將邊框樣式放入單獨的配色 class 中 */
        .unit-card .card-back { border: 0 !important; justify-content: flex-start; padding: 0 !important; }

        /* 集團軍旅配色：orange border + background for vertical text */
        .amphibious-heavy { background-color: #b71c1c; border: 1px solid #ed1c24; } 
        .amphibious-heavy + div { color: white !important; } 
        .heavy { background-color: #ffc107; border: 1px solid #ed1c24; } 
        .medium { background-color: #8bc34a; border: 1px solid #ed1c24; } 
        .light { background-color: #e0f7fa; border: 1px solid #ed1c24; } 
        .branch { background-color: #ffeb3b; border: 1px solid #ed1c24; }   

        /* ★★★ 海軍陸戰隊各戰區配色 ★★★ */
        /* Regular Marines Brigade: background color for vertical text, no padding added by class, text has colored border box */
        .marines_southern_bg { background-color: #ffc107; border: 1px solid #ed1c24; }
        .marines_eastern_bg { background-color: #e0f7fa; border: 1px solid #ed1c24; }
        .marines_northern_bg { background-color: #8bc34a; border: 1px solid #ed1c24; }
        /* Special text color handling */
        .marines_northern_bg, .marines_northern_bg + div { color: white !important; }

        /* Specialized Marines Unit/Training Base: background is white, border is the warzone color */
        .marines_southern_border { border: 2px solid #ffc107; background-color: white; color: #333; }
        .marines_eastern_border { border: 2px solid #e0f7fa; background-color: white; color: #333; }
        .marines_northern_border { border: 2px solid #8bc34a; background-color: white; color: #333; }

        /* 直排文字處理 */
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright; 
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 1.1em;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        /* 人數顯示 */
        .person-count {
            font-size: 0.85em;
            color: #333;
            margin-bottom: 10px;
        }

        /* 控制按鈕 */
        .controls {
            margin-top: 25px;
        }
        button {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            font-size: 1em;
        }
        button:hover { background-color: #0056b3; }

    </style>
</head>
<body>

    <div class="header">
        <h1>共軍部隊編組 - 記憶測驗</h1>
        <div class="selector-container">
            <span class="selector-label">選擇部隊：</span>
            <select id="armySelector">
                <optgroup label="陸軍 (集團軍)">
                    <option value="71" selected>第71集團軍</option>
                    <option value="72">第72集團軍</option>
                    <option value="73">第73集團軍</option>
                </optgroup>
                <optgroup label="海軍">
                    <option value="marines">海軍陸戰隊</option>
                </optgroup>
            </select>
        </div>
        <p style="color: #666; margin-top: 15px; margin-bottom: 0;">提示：最上方標題固定顯示。部門與旅/基地級單位已蓋牌，點擊空白框框翻牌。</p>
    </div>

    <div class="org-chart-wrapper">
        <div class="org-chart" id="orgChart">
            
            <div class="level level-1" id="level1"></div>

            <div class="level level-2" id="level2"></div>

            <div class="level level-3" id="level3"></div>

        </div>
    </div>

    <div class="controls">
        <button id="resetBtn">重新測驗 (全部蓋上)</button>
    </div>

    <script>
        // 共用的部門資料
        const defaultDeptsData = [
            { label: '參謀部' }, { label: '政治部' }, { label: '保障部' }, { label: '裝備部' }, { label: '紀檢部' }
        ];

        // 資料結構：第71集團軍
        const unitsData_71 = [
            { class: 'heavy', label: '重型合成2旅', count: '4500' },
            { class: 'heavy', label: '重型合成35旅', count: '4500' },
            { class: 'heavy', label: '重型合成160旅', count: '4500' },
            { class: 'heavy', label: '重型合成235旅', count: '4500' },
            { class: 'medium', label: '中型合成178旅', count: '4600' },
            { class: 'light', label: '輕型合成179旅', count: '5000' },
            { class: 'branch', label: '陸航71旅', count: '2000' },
            { class: 'branch', label: '砲兵71旅', count: '3000' },
            { class: 'branch', label: '防空71旅', count: '2500' },
            { class: 'branch', label: '特戰71旅', count: '2500' },
            { class: 'branch', label: '工化71旅', count: '2500' },
            { class: 'branch', label: '勤務支援71旅', count: '2500' }
        ];

        // 資料結構：第72集團軍
        const unitsData_72 = [
            { class: 'amphibious-heavy', label: '兩棲重型合成5旅', count: '4500' },
            { class: 'amphibious-heavy', label: '兩棲重型合成124旅', count: '4500' },
            { class: 'heavy', label: '重型合成10旅', count: '4500' },
            { class: 'medium', label: '中型合成34旅', count: '4600' },
            { class: 'medium', label: '中型合成85旅', count: '4600' },
            { class: 'light', label: '輕型合成90旅', count: '5000' },
            { class: 'branch', label: '陸航72旅', count: '2000' },
            { class: 'branch', label: '砲兵72旅', count: '3000' },
            { class: 'branch', label: '防空72旅', count: '2500' },
            { class: 'branch', label: '特戰72旅', count: '2500' },
            { class: 'branch', label: '工兵1旅', count: '2500' },
            { class: 'branch', label: '防化1旅', count: '2500' },
            { class: 'branch', label: '勤務支援72旅', count: '2500' }
        ];

        // 資料結構：第73集團軍
        const unitsData_73 = [
            { class: 'amphibious-heavy', label: '兩棲重型合成14旅', count: '4500' },
            { class: 'amphibious-heavy', label: '兩棲重型合成91旅', count: '4500' },
            { class: 'heavy', label: '重型合成86旅', count: '4500' },
            { class: 'medium', label: '中型合成145旅', count: '4600' },
            { class: 'light', label: '輕型合成3旅', count: '5000' },
            { class: 'light', label: '輕型合成92旅', count: '5000' },
            { class: 'branch', label: '陸航73旅', count: '2000' },
            { class: 'branch', label: '砲兵73旅', count: '3000' },
            { class: 'branch', label: '防空73旅', count: '2500' },
            { class: 'branch', label: '特戰73旅', count: '2500' },
            { class: 'branch', label: '工化73旅', count: '2500' },
            { class: 'branch', label: '勤務支援73旅', count: '2500' }
        ];

        // ★★★ 資料結構：海軍陸戰隊 ★★★
        const unitsData_Marines = [
            { class: 'marines_southern_bg', type: 'unit', label: '陸戰1旅', count: '4500' }, // 黃色
            { class: 'marines_southern_bg', type: 'unit', label: '陸戰2旅', count: '4500' }, // 黃色
            { class: 'marines_eastern_bg', type: 'unit', label: '陸戰3旅', count: '4500' }, // 淺藍色
            { class: 'marines_eastern_bg', type: 'unit', label: '陸戰4旅', count: '4500' }, // 淺藍色
            { class: 'marines_northern_bg', type: 'unit', label: '陸戰5旅', count: '4500' }, // 綠色
            { class: 'marines_northern_bg', type: 'unit', label: '陸戰6旅', count: '4500' }, // 綠色
            { class: 'marines_southern_border', type: 'special_unit', label: '特種作戰旅', count: '2000' }, // specialized color border, vertical text
            { class: 'marines_eastern_border', type: 'special_unit', label: '艦載機航空兵旅', count: '2000' }, // specialized color border, vertical text
            { class: 'marines_southern_border', type: 'base', label: '陸戰隊訓練基地', count: '1000' } // specialized color border, horizontal text
        ];

        const level1 = document.getElementById('level1');
        const level2 = document.getElementById('level2');
        const level3 = document.getElementById('level3');
        const selector = document.getElementById('armySelector');

        // 核心函式：根據選定的部隊載入組織圖
        function loadArmyChart(unitId) {
            // 清空目前的內容
            level1.innerHTML = '';
            level2.innerHTML = '';
            level3.innerHTML = '';

            // ★★★ 生成例外情況：固定的上層標題 (不翻牌) ★★★
            let armyName;
            let personCount;
            let units;

            if (unitId === 'marines') {
                armyName = '海軍陸戰隊';
                personCount = '約30000-35000人';
                units = unitsData_Marines;
            } else {
                armyName = `第${unitId}集團軍`;
                personCount = '約45000-50000人';
                if (unitId === '71') units = unitsData_71;
                else if (unitId === '72') units = unitsData_72;
                else if (unitId === '73') units = unitsData_73;
            }

            level1.innerHTML = `
                <div class="static-army">
                    <div>${armyName}</div>
                    <div class="person-count">${personCount}</div>
                </div>
            `;

            // 生成部門卡片 (翻牌)
            defaultDeptsData.forEach(dept => createFlashCard(dept, 'dept', level2));

            // 生成單位級卡片 (翻牌)
            units.forEach(unit => createFlashCard(unit, 'unit', level3));
        }

        // 產生卡片的函式 (只處理翻牌卡片)
        function createFlashCard(data, type, container) {
            const cardWrapper = document.createElement('div');
            cardWrapper.className = `flashcard-container ${type}-card`;
            cardWrapper.onclick = function() {
                this.querySelector('.flashcard').classList.toggle('is-flipped');
            };

            const flashcard = document.createElement('div');
            flashcard.className = 'flashcard';

            const front = document.createElement('div');
            front.className = 'card-face card-front';
            front.textContent = '?';

            const back = document.createElement('div');
            // 初始化 card-back 類別，不帶預設邊框
            back.className = `card-face card-back`; 

            // ★★★ 處理不同單位的呈現例外 ★★★
            if (type === 'unit') {
                // 將配色 class 直接加入 card-back
                back.className += ` ${data.class || ''}`;

                if (data.type === 'base') {
                    // ★★★ 例外 1：訓練基地採用水平文字，彩色邊框 ★★★
                    back.style.padding = '10px 5px'; // 特別 padding
                    back.innerHTML = `
                        <div>${data.label}</div>
                        <div class="person-count">${data.count}</div>
                    `;
                } else if (data.type === 'special_unit') {
                    // ★★★ 例外 2：特種作戰/航空兵旅採用彩色邊框、白色底色，文字直排 ★★★
                    back.innerHTML = `
                        <div class="vertical-text" style="padding-top:10px">${data.label}</div>
                        <div class="person-count">${data.count}</div>
                    `;
                } else {
                    // ★★★ 一般旅級單位：彩色文字底色，文字直排 ★★★
                    // 加入預設的直排文字 padding
                    back.style.paddingTop = '10px';
                    back.innerHTML = `
                        <div class="vertical-text">${data.label}</div>
                        <div class="person-count">${data.count}</div>
                    `;
                }
            } else {
                // 部門卡片：一般橫排
                back.innerHTML = `<div>${data.label}</div>`;
            }

            flashcard.appendChild(front);
            flashcard.appendChild(back);
            cardWrapper.appendChild(flashcard);
            container.appendChild(cardWrapper);
        }

        // 監聽下拉式選單變化
        selector.onchange = function() {
            loadArmyChart(this.value);
        };

        // 重置按鈕
        document.getElementById('resetBtn').onclick = () => {
            document.querySelectorAll('.flashcard').forEach(card => card.classList.remove('is-flipped'));
        };

        // 初始化：預設載入第71集團軍
        loadArmyChart('71');

    </script>
</body>
</html>
